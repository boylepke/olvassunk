<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Learning Letters · Little Sprouts</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700;800&subset=latin-ext&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      font-family: 'Nunito', sans-serif;
      background: #87CEEB;
    }

    /* ── SCREEN MANAGER ─────────────────────────────── */
    .screen {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════
       GAME SCREEN
    ══════════════════════════════════════════════════ */
    #game-screen { overflow: hidden; padding-bottom: env(safe-area-inset-bottom, 0px); }

    /* ── Upper field: sky + grass ─────────────────── */
    #upper-field {
      flex: 1;
      position: relative;
      background: linear-gradient(
        180deg,
        #6EC6F0 0%,
        #A8DCF5 28%,
        #7ED168 28%,
        #8EDA78 100%
      );
      overflow: visible;
    }

    /* ── Wave dividers ─────────────────────────────── */
    .wave-divider {
      position: relative;
      z-index: 15;
      line-height: 0;
      flex-shrink: 0;
    }
    .wave-divider svg { display: block; width: 100%; }

    /* ── Stream ────────────────────────────────────── */
    #stream {
      flex-shrink: 0;
      height: var(--stream-h, 72px);
      position: relative;
      background: #3AADE0;
      overflow: hidden;
      z-index: 12;
    }

    /* Flowing ripple layers */
    #stream::before, #stream::after {
      content: '';
      position: absolute;
      inset: 0;
    }
    #stream::before {
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 55px,
        rgba(255,255,255,0.18) 55px, rgba(255,255,255,0.18) 80px
      );
      animation: ripple1 1.8s linear infinite;
    }
    #stream::after {
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 35px,
        rgba(255,255,255,0.10) 35px, rgba(255,255,255,0.10) 50px
      );
      animation: ripple2 2.8s linear infinite;
    }

    @keyframes ripple1 { to { background-position-x: -80px; } }
    @keyframes ripple2 { to { background-position-x: 50px; } }

    /* Fish & duck swimming in stream */
    .stream-creature {
      position: absolute;
      font-size: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 16;
    }
    @keyframes swimRight { from { left: -8%; } to { left: 110%; } }
    @keyframes swimLeft  { from { left: 110%; transform: translateY(-50%) scaleX(-1); } to { left: -8%; transform: translateY(-50%) scaleX(-1); } }

    /* ── Lower field: left bank ────────────────────── */
    #lower-field {
      flex-shrink: 0;
      height: var(--bank-h, 33vh);
      position: relative;
      background: linear-gradient(180deg, #6BBF58 0%, #59AB46 100%);
      overflow: visible;
    }

    /* ── Target outline ────────────────────────────── */
    #target-outline {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--outline-sz, 86px); height: var(--outline-sz, 86px);
      border-radius: 20px;
      border: 4px dashed rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', cursive;
      font-size: var(--outline-fs, 50px);
      color: rgba(255,255,255,0.35);
      z-index: 5;
      animation: outlinePulse 2s ease-in-out infinite;
      transition: border-color 0.4s, color 0.4s, background 0.4s;
    }
    @keyframes outlinePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      50%      { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
    }
    #target-outline.correct {
      animation: none;
      border-style: solid;
      border-color: rgba(255,255,255,0.9);
      color: #fff;
      background: rgba(255,255,255,0.2);
    }

    /* "Match this!" arrow hint */
    #match-hint {
      position: absolute;
      left: var(--hint-left, 130px);
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Fredoka', cursive;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      pointer-events: none;
    }
    #match-hint span { font-size: 22px; }

    /* ── Tiles overlay layer (full-screen, on top) ─── */
    #tiles-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ── Letter tiles ──────────────────────────────── */
    .letter-tile {
      position: absolute;
      width: var(--tile-sz, 80px); height: var(--tile-sz, 80px);
      background: #FFF8EE;
      border: 3px solid #D9BC8E;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', cursive;
      font-size: var(--tile-fs, 44px);
      color: #3A2F24;
      cursor: grab;
      pointer-events: auto;
      touch-action: none;
      box-shadow:
        0 5px 0 #C0A060,
        0 7px 16px rgba(0,0,0,0.16);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .letter-tile.grabbed {
      cursor: grabbing;
      transform: scale(1.12) rotate(-4deg);
      box-shadow: 0 12px 0 #C0A060, 0 18px 30px rgba(0,0,0,0.22);
      z-index: 200 !important;
    }

    /* ── Decorations ───────────────────────────────── */
    .deco {
      position: absolute;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* ── UI badges ─────────────────────────────────── */
    #round-badge {
      position: absolute;
      top: 13px; right: 13px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 800;
      color: #3A4A2A;
      z-index: 30;
    }

    #back-btn {
      position: absolute;
      top: 13px; left: 13px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(4px);
      border: none; border-radius: 50%;
      font-size: 20px; cursor: pointer;
      z-index: 30;
      display: grid; place-items: center;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* ── Beetle spectator ──────────────────────────── */
    #beetle {
      position: absolute;
      right: 18%;
      top: 50%;
      transform: translateY(-50%);
      font-size: var(--beetle-fs, 58px);
      z-index: 8;
      pointer-events: none;
      transition: filter 0.2s ease;
      animation: beetleIdle 3s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes beetleIdle {
      0%, 100% { transform: translateY(-50%) rotate(-4deg) scale(1);   }
      50%       { transform: translateY(-54%) rotate( 4deg) scale(1.02); }
    }

    #beetle.celebrate {
      animation: beetleCelebrate 0.6s ease infinite;
    }
    @keyframes beetleCelebrate {
      0%   { transform: translateY(-50%) scale(1)    rotate(0deg);   }
      20%  { transform: translateY(-80%) scale(1.25) rotate(-12deg); }
      40%  { transform: translateY(-50%) scale(1.1)  rotate( 10deg); }
      60%  { transform: translateY(-72%) scale(1.2)  rotate(-8deg);  }
      80%  { transform: translateY(-50%) scale(1.05) rotate( 6deg);  }
      100% { transform: translateY(-50%) scale(1)    rotate(0deg);   }
    }

    #beetle.sad {
      animation: beetleSad 0.5s ease 3;
    }
    @keyframes beetleSad {
      0%   { transform: translateY(-50%) rotate(0deg)   scale(1);    }
      15%  { transform: translateY(-44%) rotate(-14deg) scale(0.92); }
      35%  { transform: translateY(-56%) rotate( 10deg) scale(0.95); }
      55%  { transform: translateY(-44%) rotate(-8deg)  scale(0.92); }
      75%  { transform: translateY(-50%) rotate( 5deg)  scale(0.96); }
      100% { transform: translateY(-50%) rotate(0deg)   scale(1);    }
    }


    #success-overlay { display: none; position:absolute; inset:0; z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:18px; background:rgba(0,0,0,0.08); }
    #success-overlay.show { display: flex; }

    .success-ring {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 32px;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    .success-emojis {
      font-size: 48px;
      letter-spacing: 4px;
      animation: wiggle 0.6s ease-in-out infinite alternate;
    }
    @keyframes wiggle {
      from { transform: rotate(-6deg) scale(1); }
      to   { transform: rotate( 6deg) scale(1.05); }
    }

    .next-btn {
      background: #5DC04D;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 15px 36px;
      font-family: 'Fredoka', cursive;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 0 #3A9A2B, 0 7px 18px rgba(93,192,77,0.35);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, box-shadow 0.1s;
      animation: popIn 0.45s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .next-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #3A9A2B, 0 4px 10px rgba(93,192,77,0.3);
    }

    /* ── Confetti canvas ───────────────────────────── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ══════════════════════════════════════════════════
       STATS SCREEN
    ══════════════════════════════════════════════════ */
    #stats-screen {
      background: #F7F2EA;
      align-items: center;
      justify-content: flex-start;
      padding: 44px 22px 32px;
      overflow-y: auto;
      gap: 0;
    }

    .stats-hero {
      font-size: 56px;
      margin-bottom: 6px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .stats-title {
      font-family: 'Fredoka', cursive;
      font-size: 32px;
      color: #3A2F24;
      margin-bottom: 4px;
    }
    .stats-sub {
      font-size: 15px; font-weight: 700;
      color: #8C7B6B;
      margin-bottom: 22px;
    }

    .stats-total {
      background: #FFD93D;
      border-radius: 60px;
      padding: 12px 28px;
      font-family: 'Fredoka', cursive;
      font-size: 20px;
      color: #3A2F24;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(255,217,61,0.4), 0 3px 0 #C8A820;
    }

    .stats-list {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      gap: 9px;
      margin-bottom: 26px;
    }

    .stat-row {
      background: #fff;
      border-radius: 16px;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .stat-ltr {
      font-family: 'Fredoka', cursive;
      font-size: 30px; color: #3A2F24;
      width: 38px;
    }
    .stat-tries {
      font-size: 13px; font-weight: 700;
      color: #8C7B6B; flex: 1;
      text-align: center;
    }
    .stat-stars { font-size: 20px; letter-spacing: 1px; }

    .play-again-btn {
      background: #6BBF59;
      color: #fff;
      border: none; border-radius: 50px;
      padding: 16px 40px;
      font-family: 'Fredoka', cursive;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 0 #4A9A38, 0 7px 18px rgba(107,191,89,0.35);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Zoom badge ── */
    #zoom-badge {
      position:absolute; top:13px; left:50%; transform:translateX(-50%);
      z-index:200; display:flex; gap:2px;
      background:rgba(255,255,255,0.88); backdrop-filter:blur(6px);
      border-radius:50px; padding:3px 4px;
      box-shadow:0 2px 8px rgba(0,0,0,0.12);
      transition:opacity .3s ease;
    }
    #zoom-badge.faded { opacity:0.22; }
    .zb {
      border:none; border-radius:50px; padding:4px 12px;
      font-family:'Fredoka',cursive; font-size:14px; font-weight:600;
      color:#3A4A2A; background:transparent; cursor:pointer;
      -webkit-tap-highlight-color:transparent; user-select:none;
      transition:background .15s,color .15s;
    }
    .zb.on { background:#3A4A2A; color:#fff; }
  </style>

  <!-- LAYOUT ENGINE: geometry-first, no device profiles, zoom scalar -->
  <script>
  (function(){
    /* Zoom scalar — 3 levels stored in localStorage 'ls_zoom' */
    var ZS=[0.82,1.0,1.2];
    window.LS_zoomIdx=1;
    try{ var zi=parseInt(localStorage.getItem('ls_zoom')); if(zi>=0&&zi<ZS.length) window.LS_zoomIdx=zi; }catch(e){}

    /* Core solver: derives every px value from actual viewport geometry */
    window.LS_solve=function(){
      var vw=window.innerWidth;
      var vh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
      var z=ZS[window.LS_zoomIdx];
      /* Scene structure */
      var streamH=Math.max(Math.round(vh*0.075),48);
      var bankH=Math.round(Math.max(Math.min(vh*0.33,360),160));
      var upperH=vh-streamH-44-bankH;
      var grassH=upperH*0.68;
      /* Tile sizes — solve width & height constraints simultaneously */
      var GAP_R=0.14;
      var tByW=Math.floor(vw*0.90/(3+2*GAP_R));    /* letters: 3-col width  */
      var tByH=Math.floor(grassH*0.88/(2+GAP_R));  /* 2-row height          */
      var tile=Math.round(Math.min(tByW,tByH,118)*z);
      var nByW=Math.floor(vw*0.94/(5+4*GAP_R));    /* numbers: 5-col width  */
      var numTile=Math.round(Math.min(nByW,tByH,108)*z);
      return {vw:vw,vh:vh,z:z,streamH:streamH,bankH:bankH,grassH:grassH,
              tile:tile,numTile:numTile,
              outline:Math.round(tile*1.08),zone:Math.round(numTile*1.18),
              beetle:Math.round(Math.min(bankH*0.35,76)*z)};
    };

    /* Apply to CSS custom properties */
    window.LS_applyLayout=function(){
      var L=window.LS_solve(),r=document.documentElement;
      r.style.setProperty('--stream-h',  L.streamH+'px');
      r.style.setProperty('--bank-h',    L.bankH+'px');
      r.style.setProperty('--tile-sz',   L.tile+'px');
      r.style.setProperty('--tile-fs',   Math.round(L.tile*0.55)+'px');
      r.style.setProperty('--outline-sz',L.outline+'px');
      r.style.setProperty('--outline-fs',Math.round(L.outline*0.58)+'px');
      r.style.setProperty('--zone-sz',   L.zone+'px');
      r.style.setProperty('--zone-fs',   Math.round(L.zone*0.68)+'px');
      r.style.setProperty('--hint-left', (Math.max(L.outline,L.zone)+28)+'px');
      r.style.setProperty('--beetle-fs', L.beetle+'px');
      window.LS_layout=L; return L;
    };

    window.LS_applyLayout();  /* run before first paint */
  })();
  </script>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- ═══════════════════════════════════════════
     GAME SCREEN
═══════════════════════════════════════════ -->
<div id="game-screen" class="screen active">

  <!-- Upper field (sky + grass) -->
  <div id="upper-field">
    <button id="back-btn" onclick="goBackHome()">←</button>
    <div id="round-badge">Round <span id="round-num">1</span> / 10</div>
    <!-- Flowers, clouds, tiles injected by JS -->
  </div>

  <!-- Wave: upper-field → stream -->
  <div class="wave-divider" style="margin-bottom:-2px; z-index:14;">
    <svg viewBox="0 0 360 22" preserveAspectRatio="none" height="22" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,11 Q45,0 90,11 T180,11 T270,11 T360,11 L360,22 L0,22Z" fill="#3AADE0"/>
    </svg>
  </div>

  <!-- Stream -->
  <div id="stream">
    <!-- Creatures injected by JS -->
  </div>

  <!-- Wave: stream → lower-field -->
  <div class="wave-divider" style="margin-top:-2px; z-index:14;">
    <svg viewBox="0 0 360 22" preserveAspectRatio="none" height="22" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,11 Q45,22 90,11 T180,11 T270,11 T360,11 L360,0 L0,0Z" fill="#6BBF58"/>
    </svg>
  </div>

  <!-- Lower field (left bank) -->
  <div id="lower-field">
    <div id="target-outline">A</div>
    <div id="match-hint"><span></span></div>
    <div id="beetle">🐞</div>
    <!-- Flowers injected by JS -->
  </div>

  <!-- Tiles floating layer -->
  <div id="tiles-layer"></div>

  <div id="success-overlay">
    <div class="success-ring">
      <div class="success-emojis">🎉 ⭐ 🎉</div>
      <button class="next-btn" id="next-btn" onclick="nextRound()">Next Round →</button>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════
     STATS SCREEN
═══════════════════════════════════════════ -->
<div id="stats-screen" class="screen">
  <div class="stats-hero">🏅</div>
  <div class="stats-title">All done!</div>
  <div class="stats-sub">Here's how it went:</div>
  <div class="stats-total" id="stats-total">⭐ 0 / 30 stars</div>
  <div class="stats-list" id="stats-list"></div>
  <button class="play-again-btn" onclick="restartGame()">Play Again! 🔄</button>
</div>

<script>
/* ──────────────────────────────────────────────────
   GAME DATA
────────────────────────────────────────────────── */
/* Full Hungarian single-letter pool (no digraphs) */
const LETTER_POOL = [
  'A','Á','B','C','D','E','É','F','G','H',
  'I','Í','J','K','L','M','N','O','Ó','Ö',
  'Ő','P','R','S','T','U','Ú','Ü','Ű','V','Z'
];

/* Visually/acoustically similar groups — smart distractors */
const SIMILAR = {
  'A':['Á','H','V','M'],  'Á':['A','É','H','V'],  'B':['D','P','R','E'],
  'C':['G','O','S','Z'],  'D':['B','P','O','G'],   'E':['É','F','B','L'],
  'É':['E','Á','F','B'],  'F':['E','T','P','L'],   'G':['C','O','D','S'],
  'H':['N','M','K','I'],  'I':['Í','L','T','J'],   'Í':['I','L','T','J'],
  'J':['I','Í','L','T'],  'K':['H','N','M','R'],   'L':['I','T','J','É'],
  'M':['N','H','A','K'],  'N':['M','H','K','U'],   'O':['Ó','Ö','Ő','C'],
  'Ó':['O','Ö','Ő','C'],  'Ö':['O','Ó','Ő','U'],  'Ő':['Ö','Ó','O','Ü'],
  'P':['B','D','R','F'],  'R':['P','B','F','K'],   'S':['Z','C','G','F'],
  'T':['F','L','I','J'],  'U':['Ú','Ü','Ű','N'],   'Ú':['U','Ü','Ű','N'],
  'Ü':['Ű','U','Ú','Ö'],  'Ű':['Ü','U','Ú','Ö'],  'V':['U','A','F','M'],
  'Z':['S','C','G','F'],
};

function makeDistractors(target, count) {
  const base   = (SIMILAR[target] || []).filter(l => l !== target);
  const others = LETTER_POOL.filter(l => l !== target && !base.includes(l));
  return shuffle([...base, ...shuffle(others)]).slice(0, count);
}

/* Rebuilt fresh each game — 10 random letters, no repeats */
let ROUNDS = [];

function buildRounds() {
  ROUNDS = shuffle([...LETTER_POOL])
    .slice(0, 10)
    .map(letter => ({ target: letter, distractors: makeDistractors(letter, 4) }));
}

const UPPER_DECOS = [
  { e:'☁️',  t:'7%',  l:'6%',  s:46, z:2  },
  { e:'☁️',  t:'4%',  l:'38%', s:58, z:2  },
  { e:'☁️',  t:'9%',  r:'8%',  s:38, z:2  },
  { e:'🌸', t:'44%', l:'6%',  s:30, z:3  },
  { e:'🌼', t:'56%', l:'20%', s:24, z:3  },
  { e:'🌺', t:'42%', r:'10%', s:28, z:3  },
  { e:'🌸', t:'60%', r:'24%', s:22, z:3  },
  { e:'🌻', t:'50%', l:'42%', s:26, z:3  },
  { e:'🦋', t:'35%', l:'28%', s:22, z:4  },
];

const LOWER_DECOS = [
  { e:'🌸', t:'25%', r:'14%', s:28 },
  { e:'🌼', t:'55%', r:'28%', s:22 },
  { e:'🌺', t:'18%', r:'7%',  s:26 },
  { e:'🍀', t:'65%', r:'45%', s:20 },
];

/* ──────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────── */
let roundIdx   = 0;
let tries      = 0;
let stats      = [];   // { letter, tries }
let animating  = false;

/* drag state */
let drag = { on:false, tile:null, ox:0, oy:0, origL:0, origT:0 };


/* ── Zoom badge: A− / A / A+ ── */
function buildZoomBadge(cid){
  var LABELS=['A\u2212','A','A+'];
  var wrap=document.createElement('div'); wrap.id='zoom-badge';
  LABELS.forEach(function(lbl,idx){
    var btn=document.createElement('button');
    btn.className='zb'+(idx===window.LS_zoomIdx?' on':'');
    btn.textContent=lbl;
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      window.LS_zoomIdx=idx;
      try{localStorage.setItem('ls_zoom',idx);}catch(x){}
      wrap.querySelectorAll('.zb').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      window.LS_applyLayout();
      if(typeof onLayoutChanged==='function') onLayoutChanged();
      clearTimeout(ft); wrap.classList.remove('faded'); sf();
    });
    wrap.appendChild(btn);
  });
  var ft; function sf(){ft=setTimeout(function(){wrap.classList.add('faded');},5000);}
  wrap.addEventListener('mouseenter',function(){clearTimeout(ft);wrap.classList.remove('faded');});
  wrap.addEventListener('mouseleave',sf);
  document.getElementById(cid||'game-screen').appendChild(wrap);
  sf();
}

function onLayoutChanged(){
  document.querySelectorAll('.letter-tile').forEach(t=>t.remove());
  if(typeof roundIdx!=='undefined'&&ROUNDS[roundIdx])
    spawnTiles(shuffle([ROUNDS[roundIdx].target,...ROUNDS[roundIdx].distractors]));
}
function init(){
  buildRounds();
  roundIdx=0; tries=0; stats=[];
  buildDecorations(); buildStreamCreatures();
  buildZoomBadge('game-screen');
  loadRound(); showScreen('game-screen');
}

function buildDecorations() {
  const upper = document.getElementById('upper-field');
  const lower = document.getElementById('lower-field');

  // Remove old decos
  upper.querySelectorAll('.deco').forEach(d => d.remove());
  lower.querySelectorAll('.deco').forEach(d => d.remove());

  UPPER_DECOS.forEach(d => {
    const el = deco(d);
    el.style.zIndex = d.z || 3;
    upper.appendChild(el);
  });
  LOWER_DECOS.forEach(d => lower.appendChild(deco(d)));
}

function deco(d) {
  const el = document.createElement('div');
  el.className = 'deco';
  el.textContent = d.e;
  el.style.fontSize = d.s + 'px';
  if (d.t) el.style.top   = d.t;
  if (d.l) el.style.left  = d.l;
  if (d.r) el.style.right = d.r;
  return el;
}

function buildStreamCreatures() {
  const stream = document.getElementById('stream');
  stream.querySelectorAll('.stream-creature').forEach(c => c.remove());

  const creatures = [
    { e:'🐟', top:'22%', dur:9,  delay:0,  dir:'left'  },
    { e:'🐠', top:'58%', dur:13, delay:3,  dir:'left'  },
    { e:'🐡', top:'35%', dur:7,  delay:6,  dir:'right' },
    { e:'🦆', top:'15%', dur:11, delay:1,  dir:'left'  },
  ];

  creatures.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stream-creature deco';
    el.textContent = c.e;
    el.style.top = c.top;
    el.style.fontSize = '20px';
    el.style.animation = `${c.dir === 'left' ? 'swimLeft' : 'swimRight'} ${c.dur}s ${c.delay}s linear infinite`;
    stream.appendChild(el);
  });
}

/* ──────────────────────────────────────────────────
   ROUND LOADING
────────────────────────────────────────────────── */
function loadRound() {
  const round = ROUNDS[roundIdx];
  tries = 0;
  animating = false;

  document.getElementById('round-num').textContent = roundIdx + 1;

  // Reset beetle
  const beetle = document.getElementById('beetle');
  beetle.classList.remove('celebrate', 'sad');

  // Target
  const outline = document.getElementById('target-outline');
  outline.textContent = round.target;
  outline.className = '';   // removes 'correct'
  // re-apply pulse via style
  outline.style.animation = '';
  void outline.offsetWidth; // reflow
  outline.style.animation = 'outlinePulse 2s ease-in-out infinite';

  // Hide success
  document.getElementById('success-overlay').classList.remove('show');

  // Remove old tiles
  document.querySelectorAll('.letter-tile').forEach(t => t.remove());

  // Create shuffled tiles
  const letters = shuffle([round.target, ...round.distractors]);
  spawnTiles(letters);
}

function spawnTiles(letters) {
  const tilesLayer = document.getElementById('tiles-layer');
  const gameRect   = document.getElementById('game-screen').getBoundingClientRect();
  const upperField = document.getElementById('upper-field');
  const upperRect  = upperField.getBoundingClientRect();

  const L=window.LS_layout||window.LS_solve();
  const count=letters.length;
  const cols=Math.ceil(Math.sqrt(count+0.1));
  const rows=Math.ceil(count/cols);
  const FIT=Math.floor(window.innerWidth*0.92/(cols+(cols-1)*0.14));
  const TILE=Math.min(L.tile,FIT);
  const GAP=Math.round(TILE*0.14);
  document.documentElement.style.setProperty('--tile-sz',TILE+'px');
  document.documentElement.style.setProperty('--tile-fs',Math.round(TILE*0.55)+'px');
  const gridW = cols * TILE + (cols - 1) * GAP;
  const gridH = rows * TILE + (rows - 1) * GAP;

  // Grass starts at 28% of upper field height
  const grassTop    = upperRect.top  - gameRect.top + upperRect.height * 0.30;
  const grassBottom = upperRect.bottom - gameRect.top - 10;
  const availH      = grassBottom - grassTop;

  const startX = (gameRect.width - gridW) / 2;
  const startY = grassTop + (availH - gridH) / 2;

  letters.forEach((letter, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const lx  = startX + col * (TILE + GAP);
    const ly  = startY + row * (TILE + GAP);

    const tile = document.createElement('div');
    tile.className    = 'letter-tile';
    tile.textContent  = letter;
    tile.dataset.letter = letter;
    tile.dataset.origL  = lx;
    tile.dataset.origT  = ly;
    tile.style.left = lx + 'px';
    tile.style.top  = ly + 'px';
    tile.style.zIndex = 60 + i;

    tile.addEventListener('mousedown',  e => onDragStart(e, tile));
    tile.addEventListener('touchstart', e => onDragStart(e, tile), { passive: false });

    tilesLayer.appendChild(tile);
  });
}

/* ──────────────────────────────────────────────────
   DRAG & DROP
────────────────────────────────────────────────── */
function evtPos(e) {
  const src = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
  return { x: src.clientX, y: src.clientY };
}

function gameOffset() {
  return document.getElementById('game-screen').getBoundingClientRect();
}

function onDragStart(e, tile) {
  if (animating) return;
  e.preventDefault();

  const pos  = evtPos(e);
  const rect = tile.getBoundingClientRect();

  drag = {
    on: true, tile,
    ox: pos.x - rect.left,
    oy: pos.y - rect.top,
    origL: parseFloat(tile.dataset.origL),
    origT: parseFloat(tile.dataset.origT),
  };

  tile.classList.add('grabbed');

  document.addEventListener('mousemove',  onDragMove);
  document.addEventListener('mouseup',    onDragEnd);
  document.addEventListener('touchmove',  onDragMove, { passive: false });
  document.addEventListener('touchend',   onDragEnd);
}

function onDragMove(e) {
  if (!drag.on) return;
  e.preventDefault();
  const pos = evtPos(e);
  const gr  = gameOffset();
  drag.tile.style.left = (pos.x - gr.left - drag.ox) + 'px';
  drag.tile.style.top  = (pos.y - gr.top  - drag.oy) + 'px';
}

function onDragEnd(e) {
  if (!drag.on) return;
  drag.on = false;
  document.removeEventListener('mousemove',  onDragMove);
  document.removeEventListener('mouseup',    onDragEnd);
  document.removeEventListener('touchmove',  onDragMove);
  document.removeEventListener('touchend',   onDragEnd);

  const tile   = drag.tile;
  tile.classList.remove('grabbed');

  const tRect  = tile.getBoundingClientRect();
  const oRect  = document.getElementById('target-outline').getBoundingClientRect();
  const tCX    = tRect.left + tRect.width  / 2;
  const tCY    = tRect.top  + tRect.height / 2;
  const oCX    = oRect.left + oRect.width  / 2;
  const oCY    = oRect.top  + oRect.height / 2;
  const dist   = Math.hypot(tCX - oCX, tCY - oCY);

  if (dist < 72) {
    tries++;
    if (tile.dataset.letter === ROUNDS[roundIdx].target) {
      animating = true;
      lockAllTiles();
      animateCorrect(tile, oRect);
    } else {
      animateWrong(tile);
    }
  } else {
    snapBack(tile);
  }
}

function lockAllTiles() {
  document.querySelectorAll('.letter-tile').forEach(t => t.style.pointerEvents = 'none');
}
function unlockAllTiles() {
  document.querySelectorAll('.letter-tile').forEach(t => t.style.pointerEvents = '');
}

/* ──────────────────────────────────────────────────
   ANIMATIONS
────────────────────────────────────────────────── */
function snapBack(tile) {
  tile.style.transition = 'left .35s cubic-bezier(.34,1.56,.64,1), top .35s cubic-bezier(.34,1.56,.64,1)';
  tile.style.left = drag.origL + 'px';
  tile.style.top  = drag.origT + 'px';
  after(380, () => { tile.style.transition = ''; });
}

function animateWrong(tile) {
  animating = true;
  lockAllTiles();
  beetleReact('sad');
  speakWrong();

  const gr      = gameOffset();
  const sRect   = document.getElementById('stream').getBoundingClientRect();
  const streamY = sRect.top + sRect.height / 2 - gr.top - 40; // centre tile on stream
  const curL    = parseFloat(tile.style.left);

  // 1. Fall into stream
  setTrans(tile, 'left .15s ease, top .38s cubic-bezier(.5,-.1,.9,.8), transform .4s ease');
  tile.style.top       = streamY + 'px';
  tile.style.transform = 'rotate(28deg) scale(0.82)';

  // 2. Splash/bob
  after(430, () => {
    setTrans(tile, 'left .4s ease, top .22s ease, transform .3s ease');
    tile.style.transform = 'rotate(-18deg) scale(0.82)';
    tile.style.top       = (streamY + 10) + 'px';

    // 3. Crawl upstream (left)
    after(300, () => {
      setTrans(tile, 'left .5s ease, top .25s ease, transform .25s ease');
      tile.style.left      = Math.max(curL - 70, -10) + 'px';
      tile.style.transform = 'rotate(8deg) scale(0.82)';

      // 4. Swim back home
      after(520, () => {
        setTrans(tile, 'left .45s cubic-bezier(.34,1.56,.64,1), top .45s cubic-bezier(.34,1.56,.64,1), transform .3s ease');
        tile.style.left      = drag.origL + 'px';
        tile.style.top       = drag.origT + 'px';
        tile.style.transform = '';
        after(480, () => {
          tile.style.transition = '';
          animating = false;
          unlockAllTiles();
        });
      });
    });
  });
}

function animateCorrect(tile, oRect) {
  const gr    = gameOffset();
  const tSz   = tile.getBoundingClientRect().width||80;
  const destL = oRect.left - gr.left + (oRect.width  - tSz) / 2;
  const destT = oRect.top  - gr.top  + (oRect.height - tSz) / 2;

  // Swim across (slight bob via scale)
  setTrans(tile, 'left .5s cubic-bezier(.34,1.56,.64,1), top .5s cubic-bezier(.34,1.56,.64,1), transform .4s ease');
  tile.style.left      = destL + 'px';
  tile.style.top       = destT + 'px';
  tile.style.transform = 'scale(1.12)';

  after(500, () => {
    tile.style.transform = 'scale(1)';
    tile.style.zIndex    = '6';

    // Fill outline
    const outline = document.getElementById('target-outline');
    outline.style.animation = 'none';
    outline.classList.add('correct');

    launchConfetti();
    beetleReact('celebrate');
    speakLetter(ROUNDS[roundIdx].target);

    after(280, () => {
      document.getElementById('success-overlay').classList.add('show');
    });
  });
}

/* ──────────────────────────────────────────────────
   CONFETTI
────────────────────────────────────────────────── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx    = canvas.getContext('2d');
  const COLS   = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#C77DFF','#FF85A1'];
  const pieces = Array.from({ length: 110 }, () => ({
    x:  Math.random() * canvas.width,
    y: -15 - Math.random() * 50,
    vx: (Math.random() - 0.5) * 8,
    vy: Math.random() * 5 + 2,
    g:  0.13,
    w:  Math.random() * 12 + 5,
    h:  Math.random() * 6  + 4,
    r:  Math.random() * 360,
    rs: (Math.random() - 0.5) * 15,
    c:  COLS[Math.random() * COLS.length | 0],
  }));

  let f = 0, MAX = 160;
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += p.g; p.vx *= 0.99; p.r += p.rs;
      ctx.save();
      ctx.globalAlpha = f < MAX - 40 ? 1 : (MAX - f) / 40;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r * Math.PI / 180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (++f < MAX) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  })();
}

/* ──────────────────────────────────────────────────
   ROUND / GAME FLOW
────────────────────────────────────────────────── */
function nextRound() {
  stats.push({ letter: ROUNDS[roundIdx].target, tries });
  roundIdx++;

  if (roundIdx >= ROUNDS.length) { showStats(); return; }

  document.getElementById('success-overlay').classList.remove('show');

  // Fade old tiles out
  document.querySelectorAll('.letter-tile').forEach(t => {
    t.style.transition = 'opacity .2s ease';
    t.style.opacity = '0';
  });
  after(220, () => {
    document.querySelectorAll('.letter-tile').forEach(t => t.remove());
    loadRound();
  });
}

function showStats() {
  showScreen('stats-screen');
  const list = document.getElementById('stats-list');
  list.innerHTML = '';
  let total = 0;

  stats.forEach((s, i) => {
    const stars = s.tries === 1 ? 3 : s.tries === 2 ? 2 : 1;
    total += stars;
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.style.animationDelay = (i * 0.06) + 's';
    row.innerHTML = `
      <span class="stat-ltr">${s.letter}</span>
      <span class="stat-tries">${s.tries === 1 ? '🎯 First try!' : s.tries + ' tries'}</span>
      <span class="stat-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</span>`;
    list.appendChild(row);
  });

  document.getElementById('stats-total').textContent = `⭐ ${total} / 30 stars`;
}

function restartGame() {
  document.querySelectorAll('.letter-tile').forEach(t => t.remove());
  init();
}

function speakWrong() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  // Pick a random disappointed exclamation
  const phrases = ['nem jó!', 'ajajj!', 'nem-nem!', 'jujujj!'];
  const text = phrases[Math.floor(Math.random() * phrases.length)];

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate   = 0.82;
  utter.pitch  = 1.3;   // slightly higher = playfully scolding, not scary
  utter.volume = 1;

  const voices = window.speechSynthesis.getVoices();
  const huVoice = voices.find(v => v.lang.startsWith('hu'));
  if (huVoice) { utter.voice = huVoice; utter.lang = huVoice.lang; }
  else { utter.lang = 'hu-HU'; }

  window.speechSynthesis.speak(utter);
}


function speakLetter(letter) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(letter);
  utter.rate   = 0.78;   // slow & clear for toddlers
  utter.pitch  = 1.15;   // warm, slightly high
  utter.volume = 1;

  // Prefer a Hungarian voice; fall back gracefully
  const voices = window.speechSynthesis.getVoices();
  const huVoice = voices.find(v => v.lang.startsWith('hu'));
  if (huVoice) {
    utter.voice = huVoice;
    utter.lang  = huVoice.lang;
  } else {
    utter.lang = 'hu-HU';   // hint to the engine even without a matching voice
  }

  window.speechSynthesis.speak(utter);
}

// Voices load asynchronously on some browsers — pre-load them
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function beetleReact(mood) {
  const b = document.getElementById('beetle');
  b.classList.remove('celebrate', 'sad');
  void b.offsetWidth; // reflow to restart animation
  b.classList.add(mood);
  // Return to idle after animation finishes
  const dur = mood === 'celebrate' ? 99999 : 1600;
  after(dur, () => { b.classList.remove(mood); });
}


function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function after(ms, fn) { setTimeout(fn, ms); }

function setTrans(el, t) { el.style.transition = t; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function goBackHome() {
  // Android WebView bridge
  if (window.androidBack) { window.androidBack(); return; }
  history.back();
}

/* ──────────────────────────────────────────────────
   START
────────────────────────────────────────────────── */
window.addEventListener('load',init);
window.addEventListener('resize',function(){
  window.LS_applyLayout();
  if(typeof onLayoutChanged==='function') onLayoutChanged();
});
</script>
